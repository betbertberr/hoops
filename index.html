<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Prevents the user from accidentally pinch-zooming or panning the screen glass -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NBA Jam Kiosk</title>
    <style>
        /* Forces the game window to stretch perfectly to the 1920x1080 display margins */
        html, body, #game-container {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000000;
        }
    </style>
</head>
<body>

    <!-- Container where the virtual touchscreen arcade layout will generate -->
    <div id="game-container"></div>

    <script>
        // Setup configuration parameters for the EmulatorJS web player
        EJS_player = '#game-container';
        EJS_gameUrl = 'nbajam.bin'; // Must perfectly match your uploaded file name
        EJS_core = 'segaMD';       // Leverages the highly responsive Genesis emulator engine
        EJS_startOnLoaded = true;  // Commands the game to boot automatically without clicking an extra menu
        EJS_fullscreenOnLoaded = true; // Strips all padding for borderless arcade gameplay
        
        // Tells the display to fetch the visual assets from the open public CDN
        EJS_pathtodata = 'https://emulatorjs.org';
    </script>
    
    <!-- Executes the framework loader script straight from the cloud engine -->
    <script src="https://emulatorjs.orgloader.js"></script>

</body>
</html>
